<!DOCTYPE html>
<html lang="en" data-page="favorites">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2874f0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <title>Favorites — MeraDogs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f1f3f6; color: #212121; margin: 0; }

    .fk-nav { background: #2874f0; width: 100%; }
    .fk-nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 16px; }
    .fk-brand { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; flex-shrink: 0; }
    .fk-brand-name { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .fk-brand-sub { color: #ffe500; font-size: 10px; font-style: italic; font-weight: 500; }

    .fk-searchbar { flex: 1; max-width: 580px; display: flex; align-items: center; background: #fff; border-radius: 2px; overflow: hidden; height: 36px; }
    .fk-searchbar input { flex: 1; border: none; outline: none; padding: 0 14px; font-size: 14px; color: #333; background: transparent; }
    .fk-searchbar button { background: #2874f0; border: none; padding: 0 16px; height: 100%; cursor: pointer; display: flex; align-items: center; }

    .fk-navlinks { display: flex; align-items: center; gap: 24px; margin-left: auto; }
    .fk-navlinks a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; white-space: nowrap; opacity: .9; }
    .fk-navlinks a:hover { opacity: 1; }
    .fk-navlinks a.active { opacity: 1; border-bottom: 2px solid #ffe500; padding-bottom: 2px; }

    .fk-media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .fk-media-card { background: #fff; border-radius: 4px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .2s; cursor: pointer; }
    .fk-media-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }
    .fk-media-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: linear-gradient(135deg,#fce4ec,#f8bbd0); }
    .fk-media-thumb-wrap { position: relative; }
    .fk-media-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); display: flex; flex-direction: column; justify-content: space-between; padding: 8px; opacity: 0; transition: opacity .2s; }
    .fk-media-card:hover .fk-media-overlay { opacity: 1; }
    .fk-chip { background: rgba(255,255,255,.92); color: #212121; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 2px; border: none; cursor: pointer; white-space: nowrap; }
    .fk-chip-fav { background: #e53935; color: #fff; }

    .mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e0e0e0; z-index: 50; }
    .mob-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; font-size: 11px; color: #666; text-decoration: none; gap: 3px; }
    .mob-nav a.active { color: #2874f0; }

    @media (max-width: 768px) {
      .fk-navlinks { display: none; }
      .mob-nav { display: flex; }
      body { padding-bottom: 56px; }
      .fk-media-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

  <header class="fk-nav">
    <div class="fk-nav-inner">
      <a href="./index.html" class="fk-brand">
        <span class="fk-brand-name">MeraDogs</span>
        <span class="fk-brand-sub">Media Archive ✦</span>
      </a>

      <div class="fk-searchbar">
        <input id="navbar-search" type="text" placeholder="Search favorites…" autocomplete="off" />
        <button aria-label="Search">
          <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>

      <nav class="fk-navlinks">
        <a href="./index.html">Library</a>
        <a href="./favorites.html" class="active">Favorites</a>
        <a href="./settings.html">Settings</a>
      </nav>
    </div>
  </header>

  <div id="app"></div>
  <div id="toast-root" class="fixed right-4 top-4 z-50 space-y-2"></div>
  <div id="modal-root"></div>

  <nav class="mob-nav">
    <a href="./index.html">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="./favorites.html" class="active">
      <svg width="20" height="20" fill="#2874f0" stroke="#2874f0" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorites
    </a>
    <a href="./settings.html">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
