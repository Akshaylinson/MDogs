<!DOCTYPE html>
<html lang="en" data-page="settings">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#AAFF20" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <title>Settings - MeraDogs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000000; color: #ffffff; margin: 0; }

    .fk-nav { background: #AAFF20; width: 100%; }
    .fk-nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 16px; }
    .fk-brand { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; flex-shrink: 0; }
    .fk-brand-name { color: #000; font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .fk-brand-sub { color: #000; font-size: 10px; font-style: italic; font-weight: 500; }

    .fk-searchbar { flex: 1; max-width: 580px; display: flex; align-items: center; background: #111; border-radius: 2px; overflow: hidden; height: 36px; }
    .fk-searchbar input { flex: 1; border: none; outline: none; padding: 0 14px; font-size: 14px; color: #fff; background: transparent; }
    .fk-searchbar button { background: #AAFF20; border: none; padding: 0 16px; height: 100%; cursor: pointer; display: flex; align-items: center; color: #000; }

    .fk-navlinks { display: flex; align-items: center; gap: 24px; margin-left: auto; }
    .fk-navlinks a { color: #000; text-decoration: none; font-size: 14px; font-weight: 500; white-space: nowrap; opacity: .9; }
    .fk-navlinks a:hover { opacity: 1; }
    .fk-navlinks a.active { opacity: 1; border-bottom: 2px solid #000; padding-bottom: 2px; }

    .fk-card { background: #111; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    .fk-label { font-size: 12px; font-weight: 600; color: #bbb; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .04em; }
    .fk-select { width: 100%; height: 40px; border: 1px solid #333; border-radius: 2px; font-size: 14px; padding: 0 12px; background: #1a1a1a; color: #fff; outline: none; cursor: pointer; }
    .fk-select:focus { border-color: #AAFF20; }
    .fk-btn { height: 40px; padding: 0 20px; border-radius: 2px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; }
    .fk-btn-primary { background: #AAFF20; color: #000; }
    .fk-btn-primary:hover { background: #88cc10; }
    .fk-btn-ghost { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
    .fk-btn-ghost:hover { border-color: #AAFF20; color: #AAFF20; }
    .fk-btn-danger { background: #1a1a1a; color: #e53935; border: 1px solid #3a1010; }
    .fk-btn-danger:hover { background: #e53935; color: #fff; border-color: #e53935; }
    .fk-divider { border: none; border-top: 1px solid #222; margin: 0; }

    .mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; z-index: 50; }
    .mob-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; font-size: 11px; color: #888; text-decoration: none; gap: 3px; }
    .mob-nav a.active { color: #AAFF20; }

    @media (max-width: 768px) {
      .fk-navlinks { display: none; }
      .mob-nav { display: flex; }
      body { padding-bottom: 56px; }
    }
  </style>
</head>
<body>

  <header class="fk-nav">
    <div class="fk-nav-inner">
      <a href="./index.html" class="fk-brand">
        <span class="fk-brand-name">MeraDogs</span>
        <span class="fk-brand-sub">Media Archive</span>
      </a>

      <div class="fk-searchbar">
        <input type="text" placeholder="Settings" disabled style="color:#aaa;" />
        <button aria-label="Search">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>

      <nav class="fk-navlinks">
        <a href="./index.html">Library</a>
        <a href="./favorites.html">Favorites</a>
        <a href="./settings.html" class="active">Settings</a>
      </nav>
    </div>
  </header>

  <div id="app"></div>
  <div id="toast-root" class="fixed right-4 top-4 z-50 space-y-2"></div>
  <div id="modal-root"></div>

  <nav class="mob-nav">
    <a href="./index.html">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="./favorites.html">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorites
    </a>
    <a href="./settings.html" class="active">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
